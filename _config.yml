title: AI 落地实用开源仓库索引
description: 每天精选 20 个高质量、可落地的 AI / Agent / RAG / Agentic 项目
baseurl: "/hot-opensource-projects"
url: "https://liaoqiaochunfengchuijiuxing.github.io"
repository: liaoqiaochunfengchuijiuxing/hot-opensource-projects

theme: minima
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-relative-links

# 强制所有文件使用 default layout（解决裸 md 问题）
optional_front_matter:
  remove_originals: false

readme_index:
  enabled: true
  remove_originals: false
  with_frontmatter: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
    values:
      layout: "default"
